<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="健身計時" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>健身計時器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d0d10;
      --surface: #18181f;
      --card: #1e1e28;
      --work: #ff6b35;
      --rest: #4fc3a1;
      --text: #f0f0f5;
      --muted: #666;
      --muted2: #999;
    }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
      padding: env(safe-area-inset-top, 48px) 20px env(safe-area-inset-bottom, 24px);
      user-select: none;
      overflow-x: hidden;
    }

    /* ── SCREENS ── */
    .screen { width: 100%; max-width: 400px; display: none; flex-direction: column; align-items: center; flex: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════
       SETUP SCREEN
    ══════════════════════════════ */
    #screen-setup { justify-content: center; gap: 20px; }

    .app-title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 8px;
      align-self: flex-start;
    }

    .setup-heading {
      font-size: 28px;
      font-weight: 800;
      align-self: flex-start;
      margin-bottom: 20px;
    }

    .cfg-row {
      width: 100%;
      background: var(--card);
      border-radius: 18px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cfg-left { display: flex; flex-direction: column; gap: 2px; }
    .cfg-name { font-size: 15px; font-weight: 600; }
    .cfg-hint { font-size: 12px; color: var(--muted2); }

    .cfg-ctrl { display: flex; align-items: center; gap: 12px; }

    .adj {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: none; color: var(--text);
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .adj:active { background: #2a2a38; }

    .cfg-val { font-size: 20px; font-weight: 700; min-width: 52px; text-align: center; }

    .btn-start {
      margin-top: 8px;
      width: 100%;
      height: 64px;
      border-radius: 20px;
      border: none;
      background: var(--work);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-start:active { opacity: .85; transform: scale(.97); }

    /* ══════════════════════════════
       WORKOUT SCREEN
    ══════════════════════════════ */
    #screen-workout { justify-content: space-between; padding-top: 8px; }

    /* top bar */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .set-badge {
      background: var(--card);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted2);
    }

    .set-badge span { color: var(--text); font-size: 18px; }

    .btn-end {
      background: var(--card);
      border: none;
      border-radius: 12px;
      color: var(--muted2);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-end:active { background: #2a2a38; }

    /* stats row */
    .stats-row {
      width: 100%;
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }

    .stat-card {
      flex: 1;
      background: var(--card);
      border-radius: 16px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); }
    .stat-val { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .stat-val.work-color { color: var(--work); }
    .stat-val.rest-color { color: var(--rest); }

    /* phase display */
    .phase-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: center;
    }

    .phase-tag {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 20px;
      transition: background .3s, color .3s;
    }

    .phase-tag.work { background: rgba(255,107,53,.15); color: var(--work); }
    .phase-tag.rest { background: rgba(79,195,161,.15); color: var(--rest); }
    .phase-tag.idle { background: var(--card); color: var(--muted2); }

    .big-timer {
      font-size: 96px;
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color .3s;
    }

    .big-timer.work { color: var(--work); }
    .big-timer.rest { color: var(--rest); }
    .big-timer.idle { color: var(--muted); }

    .timer-unit { font-size: 16px; color: var(--muted2); margin-top: 4px; }

    /* main button */
    .btn-main-wrap { width: 100%; margin-bottom: 8px; }

    .btn-main {
      width: 100%;
      height: 80px;
      border-radius: 24px;
      border: none;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .15s, transform .1s, background .3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-main:active { opacity: .85; transform: scale(.97); }
    .btn-main.idle { background: var(--work); color: #fff; }
    .btn-main.work { background: var(--rest); color: #fff; }
    .btn-main.rest { background: var(--work); color: #fff; }

    .btn-icon { font-size: 26px; }

    /* hint */
    .hint-text {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    /* ══════════════════════════════
       FINISH SCREEN
    ══════════════════════════════ */
    #screen-finish { justify-content: center; gap: 0; }

    .finish-emoji { font-size: 72px; margin-bottom: 16px; }
    .finish-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; }
    .finish-sub { font-size: 15px; color: var(--muted2); margin-bottom: 40px; }

    .finish-stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .finish-row {
      background: var(--card);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .finish-row-label { font-size: 15px; color: var(--muted2); }
    .finish-row-val { font-size: 20px; font-weight: 800; }

    .btn-again {
      width: 100%;
      height: 64px;
      border-radius: 20px;
      border: none;
      background: var(--work);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-again:active { opacity: .85; }

    /* flash */
    #flash {
      pointer-events: none;
      position: fixed; inset: 0;
      opacity: 0; z-index: 99;
      transition: opacity .06s;
    }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- ══ SETUP ══ -->
<div class="screen active" id="screen-setup">
  <div class="app-title">Fitness Timer</div>
  <div class="setup-heading">設定訓練</div>

  <div class="cfg-row">
    <div class="cfg-left">
      <div class="cfg-name">訓練時間</div>
      <div class="cfg-hint">每組訓練的秒數</div>
    </div>
    <div class="cfg-ctrl">
      <button class="adj" onclick="adj('work',-5)">−</button>
      <div class="cfg-val" id="d-work">45秒</div>
      <button class="adj" onclick="adj('work',5)">+</button>
    </div>
  </div>

  <div class="cfg-row">
    <div class="cfg-left">
      <div class="cfg-name">休息時間</div>
      <div class="cfg-hint">每組之間的秒數</div>
    </div>
    <div class="cfg-ctrl">
      <button class="adj" onclick="adj('rest',-5)">−</button>
      <div class="cfg-val" id="d-rest">60秒</div>
      <button class="adj" onclick="adj('rest',5)">+</button>
    </div>
  </div>

  <button class="btn-start" onclick="initWorkout()">開始訓練</button>
</div>

<!-- ══ WORKOUT ══ -->
<div class="screen" id="screen-workout">

  <div class="top-bar">
    <div class="set-badge">第 <span id="set-num">1</span> 組</div>
    <button class="btn-end" onclick="endWorkout()">結束訓練</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">訓練時間</div>
      <div class="stat-val work-color" id="stat-work">00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">休息時間</div>
      <div class="stat-val rest-color" id="stat-rest">00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">完成組數</div>
      <div class="stat-val" id="stat-sets">0</div>
    </div>
  </div>

  <div class="phase-area">
    <div class="phase-tag idle" id="phase-tag">準備開始</div>
    <div class="big-timer idle" id="big-timer">–</div>
    <div class="timer-unit" id="timer-unit">按下開始</div>
  </div>

  <div class="btn-main-wrap">
    <button class="btn-main idle" id="btn-main" onclick="handleMain()">
      <span class="btn-icon" id="btn-icon">💪</span>
      <span id="btn-label">開始訓練</span>
    </button>
  </div>

  <div class="hint-text" id="hint-text">按下按鈕開始第 1 組</div>

</div>

<!-- ══ FINISH ══ -->
<div class="screen" id="screen-finish">
  <div class="finish-emoji">🏆</div>
  <div class="finish-title">訓練完成！</div>
  <div class="finish-sub">做得很好，繼續保持</div>
  <div class="finish-stats">
    <div class="finish-row">
      <div class="finish-row-label">完成組數</div>
      <div class="finish-row-val" id="f-sets">—</div>
    </div>
    <div class="finish-row">
      <div class="finish-row-label">總訓練時間</div>
      <div class="finish-row-val" id="f-work">—</div>
    </div>
    <div class="finish-row">
      <div class="finish-row-label">總休息時間</div>
      <div class="finish-row-val" id="f-rest">—</div>
    </div>
    <div class="finish-row">
      <div class="finish-row-label">總計時間</div>
      <div class="finish-row-val" id="f-total">—</div>
    </div>
  </div>
  <button class="btn-again" onclick="goSetup()">再來一次</button>
</div>

<script>
  // ── Config ──
  const cfg = { work: 45, rest: 60 };

  // ── State ──
  let phase = 'idle';   // idle | work | rest
  let elapsed = 0;      // seconds in current phase
  let totalWork = 0;    // accumulated work seconds
  let totalRest = 0;    // accumulated rest seconds
  let sets = 0;         // completed sets
  let currentSet = 1;
  let ticker = null;
  let startTs = null;   // timestamp when current phase started

  // ── Setup helpers ──
  function adj(key, delta) {
    const min = { work: 5, rest: 5 };
    const max = { work: 600, rest: 600 };
    cfg[key] = Math.max(min[key], Math.min(max[key], cfg[key] + delta));
    document.getElementById('d-' + key).textContent = cfg[key] + '秒';
  }

  function initWorkout() {
    phase = 'idle'; elapsed = 0;
    totalWork = 0; totalRest = 0;
    sets = 0; currentSet = 1;
    clearInterval(ticker); ticker = null;
    renderWorkout();
    showScreen('screen-workout');
  }

  // ── Main button handler ──
  function handleMain() {
    beepStart();
    if (phase === 'idle' || phase === 'rest') {
      // → 開始訓練
      if (phase === 'rest') {
        totalRest += elapsed;
        currentSet++;
      }
      phase = 'work';
      elapsed = 0;
      startTicker();
      flash('#ff6b35');
    } else if (phase === 'work') {
      // → 開始休息
      totalWork += elapsed;
      sets++;
      phase = 'rest';
      elapsed = 0;
      startTicker();
      flash('#4fc3a1');
    }
    renderWorkout();
  }

  function startTicker() {
    clearInterval(ticker);
    startTs = Date.now() - elapsed * 1000;
    ticker = setInterval(() => {
      elapsed = Math.floor((Date.now() - startTs) / 1000);
      renderWorkout();
    }, 500);
  }

  function renderWorkout() {
    // set counter
    document.getElementById('set-num').textContent = currentSet;
    document.getElementById('stat-sets').textContent = sets;
    document.getElementById('stat-work').textContent = fmt(totalWork + (phase === 'work' ? elapsed : 0));
    document.getElementById('stat-rest').textContent = fmt(totalRest + (phase === 'rest' ? elapsed : 0));

    const timer = document.getElementById('big-timer');
    const tag = document.getElementById('phase-tag');
    const btnMain = document.getElementById('btn-main');
    const btnIcon = document.getElementById('btn-icon');
    const btnLabel = document.getElementById('btn-label');
    const hint = document.getElementById('hint-text');
    const unit = document.getElementById('timer-unit');

    if (phase === 'idle') {
      timer.className = 'big-timer idle';
      timer.textContent = '–';
      tag.className = 'phase-tag idle';
      tag.textContent = '準備開始';
      unit.textContent = '按下開始';
      btnMain.className = 'btn-main idle';
      btnIcon.textContent = '💪';
      btnLabel.textContent = '開始訓練';
      hint.textContent = `按下按鈕開始第 ${currentSet} 組`;
    } else if (phase === 'work') {
      timer.className = 'big-timer work';
      timer.textContent = elapsed;
      tag.className = 'phase-tag work';
      tag.textContent = '訓練中';
      unit.textContent = '秒';
      btnMain.className = 'btn-main work';
      btnIcon.textContent = '😮‍💨';
      btnLabel.textContent = '完成，去休息';
      hint.textContent = `第 ${currentSet} 組進行中`;
    } else if (phase === 'rest') {
      timer.className = 'big-timer rest';
      timer.textContent = elapsed;
      tag.className = 'phase-tag rest';
      tag.textContent = '休息中';
      unit.textContent = '秒';
      btnMain.className = 'btn-main rest';
      btnIcon.textContent = '💪';
      btnLabel.textContent = `開始第 ${currentSet + 1} 組`;
      hint.textContent = `已完成 ${sets} 組，準備好了就按`;
    }
  }

  function endWorkout() {
    clearInterval(ticker);
    // 把當前 phase 的時間也算進去
    if (phase === 'work') { totalWork += elapsed; sets++; }
    if (phase === 'rest') { totalRest += elapsed; }

    document.getElementById('f-sets').textContent = sets + ' 組';
    document.getElementById('f-work').textContent = fmt(totalWork);
    document.getElementById('f-rest').textContent = fmt(totalRest);
    document.getElementById('f-total').textContent = fmt(totalWork + totalRest);

    beepFinish();
    showScreen('screen-finish');
  }

  function goSetup() { showScreen('screen-setup'); }

  // ── Helpers ──
  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(el => {
      el.classList.toggle('active', el.id === id);
    });
  }

  function flash(color) {
    const el = document.getElementById('flash');
    el.style.background = color;
    el.style.opacity = '0.2';
    setTimeout(() => el.style.opacity = '0', 180);
  }

  // ── Audio ──
  let actx = null;
  function ctx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }

  function tone(freq, dur, delay = 0) {
    try {
      const c = ctx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, c.currentTime + delay);
      g.gain.setValueAtTime(0.4, c.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + dur);
      o.start(c.currentTime + delay);
      o.stop(c.currentTime + delay + dur);
    } catch(e) {}
  }

  function beepStart() {
    if (phase === 'idle' || phase === 'rest') {
      tone(880, 0.12); tone(1100, 0.18, 0.16);
    } else {
      tone(440, 0.18); tone(330, 0.25, 0.22);
    }
  }

  function beepFinish() {
    tone(660, 0.15); tone(880, 0.15, 0.19); tone(1100, 0.3, 0.38);
  }

  document.addEventListener('touchstart', () => { try { ctx(); } catch(e) {} }, { once: true });

  // Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
