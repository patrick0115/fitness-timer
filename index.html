<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="健身計時" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>健身計時器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0d0d10;
      --card: #1a1a22;
      --work: #ff6b35;
      --rest: #4fc3a1;
      --text: #f0f0f5;
      --muted: #555;
      --muted2: #888;
    }

    html, body { height: 100%; height: -webkit-fill-available; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: env(safe-area-inset-top, 48px) 24px env(safe-area-inset-bottom, 32px);
      user-select: none;
    }

    /* ── Screens ── */
    .screen { width: 100%; max-width: 380px; display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ══ START SCREEN ══ */
    #screen-start { gap: 0; justify-content: center; }

    .logo { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted2); margin-bottom: 16px; }
    .logo-title { font-size: 36px; font-weight: 800; margin-bottom: 60px; }

    .btn-go {
      width: 100%;
      height: 76px;
      border-radius: 24px;
      border: none;
      background: var(--work);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-go:active { opacity: .85; transform: scale(.97); }

    /* ══ WORKOUT SCREEN ══ */
    #screen-workout { gap: 0; justify-content: space-between; min-height: 80vh; }

    /* top */
    .top-row {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
      margin-bottom: 24px;
    }

    .set-pill {
      background: var(--card);
      border-radius: 12px;
      padding: 8px 18px;
      font-size: 15px;
      font-weight: 700;
      color: var(--muted2);
    }
    .set-pill b { color: var(--text); font-size: 18px; }

    .btn-end {
      background: var(--card);
      border: none;
      border-radius: 12px;
      color: var(--muted2);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
    }
    .btn-end:active { opacity: .7; }

    /* stats */
    .stats {
      width: 100%;
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    .stat {
      flex: 1;
      background: var(--card);
      border-radius: 16px;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .stat-l { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); }
    .stat-v { font-size: 20px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .c-work { color: var(--work); }
    .c-rest { color: var(--rest); }

    /* center timer */
    .timer-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      justify-content: center;
    }

    .phase-chip {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 5px 16px;
      border-radius: 20px;
    }
    .phase-chip.work { background: rgba(255,107,53,.15); color: var(--work); }
    .phase-chip.rest { background: rgba(79,195,161,.15); color: var(--rest); }

    .big-time {
      font-size: 100px;
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .big-time.work { color: var(--work); }
    .big-time.rest { color: var(--rest); }

    /* main button */
    .btn-main {
      width: 100%;
      height: 80px;
      border-radius: 24px;
      border: none;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background .25s, opacity .15s, transform .1s;
      margin-top: 40px;
      margin-bottom: 12px;
    }
    .btn-main:active { opacity: .85; transform: scale(.97); }
    .btn-main.work { background: var(--rest); color: #fff; }
    .btn-main.rest { background: var(--work); color: #fff; }

    .sub-hint { font-size: 13px; color: var(--muted); text-align: center; min-height: 18px; }

    /* ══ FINISH SCREEN ══ */
    #screen-finish { gap: 0; justify-content: center; }

    .f-icon { font-size: 68px; margin-bottom: 14px; }
    .f-title { font-size: 30px; font-weight: 800; margin-bottom: 6px; }
    .f-sub { font-size: 15px; color: var(--muted2); margin-bottom: 40px; }

    .f-stats { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }

    .f-row {
      background: var(--card);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .f-row-l { font-size: 15px; color: var(--muted2); }
    .f-row-v { font-size: 20px; font-weight: 800; }

    .btn-again {
      width: 100%;
      height: 68px;
      border-radius: 22px;
      border: none;
      background: var(--work);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-again:active { opacity: .85; }

    /* flash */
    #flash { pointer-events: none; position: fixed; inset: 0; opacity: 0; z-index: 99; transition: opacity .07s; }
  </style>
</head>
<body>

<div id="flash"></div>

<!-- ══ START ══ -->
<div class="screen active" id="screen-start">
  <div class="logo">Fitness Timer</div>
  <div class="logo-title">健身計時器</div>
  <button class="btn-go" onclick="startWorkout()">開始訓練</button>
  <div style="margin-top:28px;font-size:12px;color:#444;letter-spacing:1px;">v1.0.0</div>
</div>

<!-- ══ WORKOUT ══ -->
<div class="screen" id="screen-workout">

  <div class="top-row">
    <div class="set-pill">第 <b id="set-num">1</b> 組</div>
    <button class="btn-end" onclick="endWorkout()">結束訓練</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-l">訓練</div>
      <div class="stat-v c-work" id="s-work">00:00</div>
    </div>
    <div class="stat">
      <div class="stat-l">休息</div>
      <div class="stat-v c-rest" id="s-rest">00:00</div>
    </div>
    <div class="stat">
      <div class="stat-l">完成組</div>
      <div class="stat-v" id="s-sets">0</div>
    </div>
  </div>

  <div class="timer-area">
    <div class="phase-chip work" id="phase-chip">訓練中</div>
    <div class="big-time work" id="big-time">00:00</div>
  </div>

  <button class="btn-main work" id="btn-main" onclick="toggle()">😮‍💨 &nbsp;完成，去休息</button>
  <div class="sub-hint" id="sub-hint">第 1 組進行中</div>

</div>

<!-- ══ FINISH ══ -->
<div class="screen" id="screen-finish">
  <div class="f-icon">🏆</div>
  <div class="f-title">訓練完成！</div>
  <div class="f-sub">做得很好，繼續保持</div>
  <div class="f-stats">
    <div class="f-row"><div class="f-row-l">完成組數</div><div class="f-row-v" id="f-sets">—</div></div>
    <div class="f-row"><div class="f-row-l">總訓練時間</div><div class="f-row-v" id="f-work">—</div></div>
    <div class="f-row"><div class="f-row-l">總休息時間</div><div class="f-row-v" id="f-rest">—</div></div>
    <div class="f-row"><div class="f-row-l">總計時間</div><div class="f-row-v" id="f-total">—</div></div>
  </div>
  <button class="btn-again" onclick="goStart()">再來一次</button>
</div>

<script>
  let phase = 'work';       // work | rest
  let phaseStart = 0;       // timestamp
  let totalWork = 0;        // ms
  let totalRest = 0;        // ms
  let sets = 0;             // completed sets
  let currentSet = 1;
  let ticker = null;

  function startWorkout() {
    phase = 'work';
    totalWork = 0; totalRest = 0;
    sets = 0; currentSet = 1;
    phaseStart = Date.now();
    clearInterval(ticker);
    ticker = setInterval(render, 500);
    render();
    show('screen-workout');
  }

  function toggle() {
    beep();
    const now = Date.now();
    if (phase === 'work') {
      totalWork += now - phaseStart;
      sets++;
      phase = 'rest';
      flash('#4fc3a1');
    } else {
      totalRest += now - phaseStart;
      currentSet++;
      phase = 'work';
      flash('#ff6b35');
    }
    phaseStart = now;
    render();
  }

  function render() {
    const now = Date.now();
    const cur = now - phaseStart;

    const workMs  = totalWork + (phase === 'work' ? cur : 0);
    const restMs  = totalRest + (phase === 'rest' ? cur : 0);

    document.getElementById('s-work').textContent  = fmtMs(workMs);
    document.getElementById('s-rest').textContent  = fmtMs(restMs);
    document.getElementById('s-sets').textContent  = sets;
    document.getElementById('set-num').textContent = currentSet;
    document.getElementById('big-time').textContent = fmtMs(cur);

    const isWork = phase === 'work';
    document.getElementById('big-time').className   = 'big-time ' + phase;
    document.getElementById('phase-chip').className = 'phase-chip ' + phase;
    document.getElementById('phase-chip').textContent = isWork ? '訓練中' : '休息中';
    document.getElementById('btn-main').className   = 'btn-main ' + phase;
    document.getElementById('btn-main').innerHTML   = isWork
      ? '😮‍💨 &nbsp;完成，去休息'
      : `💪 &nbsp;開始第 ${currentSet + 1} 組`;
    document.getElementById('sub-hint').textContent = isWork
      ? `第 ${currentSet} 組進行中`
      : `已完成 ${sets} 組，準備好按下繼續`;
  }

  function endWorkout() {
    clearInterval(ticker);
    const now = Date.now();
    if (phase === 'work') { totalWork += now - phaseStart; sets++; }
    else { totalRest += now - phaseStart; }

    document.getElementById('f-sets').textContent  = sets + ' 組';
    document.getElementById('f-work').textContent  = fmtMs(totalWork);
    document.getElementById('f-rest').textContent  = fmtMs(totalRest);
    document.getElementById('f-total').textContent = fmtMs(totalWork + totalRest);
    beepFinish();
    show('screen-finish');
  }

  function goStart() { show('screen-start'); }

  // ── Helpers ──
  function fmtMs(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    return `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
  }

  function show(id) {
    document.querySelectorAll('.screen').forEach(el => {
      el.classList.toggle('active', el.id === id);
    });
  }

  function flash(color) {
    const el = document.getElementById('flash');
    el.style.background = color;
    el.style.opacity = '0.2';
    setTimeout(() => el.style.opacity = '0', 200);
  }

  // ── Audio ──
  let actx = null;
  function getCtx() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(f, d, delay = 0) {
    try {
      const c = getCtx(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.setValueAtTime(f, c.currentTime + delay);
      g.gain.setValueAtTime(0.35, c.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + d);
      o.start(c.currentTime + delay); o.stop(c.currentTime + delay + d);
    } catch(e) {}
  }
  function beep() {
    if (phase === 'work') { tone(440, 0.18); tone(330, 0.22, 0.22); }
    else { tone(880, 0.12); tone(1100, 0.18, 0.16); }
  }
  function beepFinish() { tone(660,.15); tone(880,.15,.19); tone(1100,.3,.38); }

  document.addEventListener('touchstart', () => { try { getCtx(); } catch(e) {} }, { once: true });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
  }
</script>
</body>
</html>
